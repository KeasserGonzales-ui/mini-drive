<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Login | Mini Drive Pro</title>

  <link rel="stylesheet" href="/style.css" />
</head>

<body class="login-page">
  <div class="login-card">
    <h1>🗂️ Mini Drive Pro</h1>

    <p>Login to continue</p>

    <form id="loginForm">
      <label>Email</label>

      <input
        type="email"
        id="email"
        placeholder="Enter email"
        required
      />

      <label>Password</label>

      <input
        type="password"
        id="password"
        placeholder="Enter password"
        required
      />

      <button type="submit">Login</button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");
    const message = document.getElementById("message");

    // clear old sessions
    localStorage.clear();
    sessionStorage.clear();

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      message.textContent = "Logging in...";

      const email = document
        .getElementById("email")
        .value
        .trim()
        .toLowerCase();

      const password =
        document.getElementById("password").value;

      try {
        const response = await fetch("/auth/login", {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify({
            email,
            password,
          }),
        });

        const data = await response.json();

        console.log("LOGIN RESPONSE:", data);

        if (!response.ok || !data.token || !data.user) {
          message.textContent =
            data.message || "❌ Invalid email or password";

          return;
        }

        // normalize role
        let role = String(data.user.role || "")
          .trim()
          .toLowerCase();

        /*
          FORCE THIS ACCOUNT AS NORMAL USER
          temporary fix
        */
        if (email === "eassertest@gmail.com") {
          role = "user";
          data.user.role = "user";
        }

        // save auth
        localStorage.setItem("token", data.token);

        localStorage.setItem(
          "user",
          JSON.stringify(data.user)
        );

        console.log("FINAL ROLE:", role);

        message.textContent = "✅ Login successful";

        setTimeout(() => {

          // forced user redirect
          if (email === "eassertest@gmail.com") {
            window.location.replace("/drive.html");
            return;
          }

          // admin redirect
          if (
            role === "admin" ||
            role === "superadmin"
          ) {
            window.location.replace("/admin.html");
          }

          // normal user redirect
          else {
            window.location.replace("/drive.html");
          }

        }, 700);

      } catch (error) {
        console.error("LOGIN ERROR:", error);

        message.textContent = "❌ Server error";
      }
    });
  </script>
</body>
</html>
